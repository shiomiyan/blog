name: Dependabot Auto Merge

on:
  pull_request:
    branches: [master]
    types:
      - opened
      - reopened
      - synchronize
      - ready_for_review

permissions:
  contents: write
  pull-requests: write

jobs:
  dependabot:
    runs-on: ubuntu-latest
    name: Dependabot Auto Merge
    timeout-minutes: 10
    if: >-
      github.event.pull_request.user.login == 'dependabot[bot]' &&
      github.repository == 'shiomiyan/blog' &&
      github.event.pull_request.draft == false
    steps:
      - name: Fetch Dependabot metadata
        id: metadata
        uses: dependabot/fetch-metadata@ffa630c65fa7e0ecfa0625b5ceda64399aea1b36 # v3.0.0
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Enable auto-merge for supported npm updates
        if: |
          (
            steps.metadata.outputs.package-ecosystem == 'npm' ||
            steps.metadata.outputs.package-ecosystem == 'npm_and_yarn'
          ) &&
          (
            steps.metadata.outputs.update-type == 'version-update:semver-minor' ||
            steps.metadata.outputs.update-type == 'version-update:semver-patch'
          )
        env:
          # Use the ephemeral workflow token only. Do not use a PAT here.
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_URL: ${{ github.event.pull_request.html_url }}
        run: |
          gh pr merge \
            --auto \
            --merge \
            "${PR_URL}"
